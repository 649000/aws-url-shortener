# Test-only overrides
quarkus.dynamodb.aws.region=ap-southeast-1
quarkus.dynamodb.aws.credentials.type=static
quarkus.dynamodb.aws.credentials.static-provider.access-key-id=test
quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=test

# Disable AWS dev services - we mock the repositories, no need for LocalStack
quarkus.devservices.enabled=false

app.dynamodb.url-table=test-url-entries
app.dynamodb.click-event-table=test-click-events
