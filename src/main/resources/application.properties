quarkus.dynamodb.aws.region=ap-southeast-1
quarkus.dynamodb.aws.credentials.type=default

# Application-specific DynamoDB table names.
# Override via env vars (e.g. APP_DYNAMODB_URL_TABLE) to point at per-environment tables
# (Terraform is expected to inject these as Lambda environment variables).
app.dynamodb.url-table=${APP_DYNAMODB_URL_TABLE:url-entries}
app.dynamodb.click-event-table=${APP_DYNAMODB_CLICK_EVENT_TABLE:click-events}
